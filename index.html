<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>AR Experience</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* ── SCAN OVERLAY ── */
    #scan-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #scan-overlay.hidden { opacity: 0; pointer-events: none; }

    .reticle-wrap { width: 200px; height: 200px; position: relative; margin-bottom: 28px; }
    .reticle-svg  { width: 100%; height: 100%; animation: spin 4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .reticle-dot {
      position: absolute; top: 50%; left: 50%;
      width: 14px; height: 14px;
      background: #00e5ff; border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 24px #00e5ff, 0 0 48px rgba(0,229,255,0.4);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity:1; }
      50%      { transform: translate(-50%,-50%) scale(1.7); opacity:0.4; }
    }

    .scan-text {
      background: rgba(0,0,0,0.6); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
      padding: 14px 24px; color: #fff; font-size: 14px;
      font-family: -apple-system, sans-serif; text-align: center; max-width: 260px;
    }
    .scan-text b { color: #00e5ff; display: block; margin-bottom: 4px; font-size: 16px; }

    /* ── TAP HINT ── */
    #tap-hint {
      position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 50px;
      padding: 12px 22px; color: #fff; font-size: 14px; font-weight: 600;
      font-family: -apple-system, sans-serif; white-space: nowrap; z-index: 100;
      pointer-events: none; transition: opacity 0.5s; opacity: 0;
    }
    #tap-hint.show   { opacity: 1; }
    #tap-hint.hidden { opacity: 0; }

    /* ── TOOLTIP ── */
    #ar-tooltip {
      position: fixed; top: 42%; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 50px;
      padding: 10px 20px; color: #fff; font-size: 13px; font-weight: 600;
      font-family: -apple-system, sans-serif;
      pointer-events: none; z-index: 99;
      opacity: 0; transition: opacity 0.3s; white-space: nowrap;
    }
    #ar-tooltip.show { opacity: 1; }

    /* ── UI BAR ── */
    #ui-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 120px; z-index: 200;
      display: flex; align-items: center;
      justify-content: space-around; padding: 0 24px 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.7s ease 0.4s;
    }
    #ui-bar.show { opacity: 1; pointer-events: all; }

    .ui-btn {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none;
    }

    .btn-shutter {
      width: 74px; height: 74px; border-radius: 50%; background: #fff;
      border: 4px solid rgba(255,255,255,0.35);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.15), 0 8px 30px rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn-shutter:active { transform: scale(0.9); }

    .btn-pill {
      width: 58px; height: 58px; border-radius: 18px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.12s, background 0.15s;
    }
    .btn-pill:active { transform: scale(0.9); }

    .btn-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
      color: rgba(255,255,255,0.85); font-family: -apple-system, sans-serif;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    .music-on .btn-pill { background: rgba(0,229,255,0.2); border-color: rgba(0,229,255,0.45); }

    .bars { display: flex; align-items: flex-end; gap: 3px; height: 18px; }
    .bars span {
      width: 3px; border-radius: 2px; background: #fff;
      animation: bar 0.7s ease-in-out infinite alternate;
    }
    .bars span:nth-child(1){height:6px;animation-delay:0s}
    .bars span:nth-child(2){height:14px;animation-delay:.1s}
    .bars span:nth-child(3){height:9px;animation-delay:.2s}
    .bars span:nth-child(4){height:16px;animation-delay:.05s}
    .bars span:nth-child(5){height:7px;animation-delay:.15s}
    @keyframes bar { from{transform:scaleY(0.3)} to{transform:scaleY(1)} }
    .bars.paused span { animation-play-state: paused; }
    .music-on .bars span { background: #00e5ff; }

    /* ── FLASH ── */
    #flash {
      position: fixed; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 999; transition: opacity 0.04s;
    }
    #flash.on { opacity: 1; }

    /* ── SHARE SHEET ── */
    #share-backdrop {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #share-backdrop.show { opacity: 1; pointer-events: all; }

    #share-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 301;
      max-width: 500px; margin: 0 auto;
      background: #141414; border-radius: 28px 28px 0 0;
      padding: 10px 20px 40px;
      transform: translateY(110%); transition: transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
      font-family: -apple-system, sans-serif;
    }
    #share-sheet.show { transform: translateY(0); }

    .sheet-handle {
      width: 38px; height: 4px; background: rgba(255,255,255,0.18);
      border-radius: 2px; margin: 0 auto 16px;
    }
    #share-preview {
      width: 100%; aspect-ratio: 16/9; object-fit: cover;
      border-radius: 14px; background: #222; margin-bottom: 16px; display: none;
    }
    .sheet-title { color: #fff; font-size: 18px; font-weight: 700; margin-bottom: 3px; }
    .sheet-sub   { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 18px; }

    .share-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 16px; }
    .sapp {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .sapp-icon {
      width: 54px; height: 54px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center; font-size: 26px;
      transition: transform 0.12s;
    }
    .sapp:active .sapp-icon { transform: scale(0.88); }
    .sapp-label { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 500; }

    .btn-save {
      width: 100%; padding: 16px; border: none; border-radius: 16px;
      background: linear-gradient(135deg, #00e5ff, #7c3aed);
      color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px;
      transition: transform 0.12s, opacity 0.12s;
    }
    .btn-save:active { transform: scale(0.97); opacity: 0.88; }
    .btn-cancel {
      width: 100%; padding: 14px; border: none; border-radius: 16px;
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.65);
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- SCAN -->
<div id="scan-overlay">
  <div class="reticle-wrap">
    <svg class="reticle-svg" viewBox="0 0 200 200" fill="none">
      <circle cx="100" cy="100" r="90" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <circle cx="100" cy="100" r="90" stroke="url(#rg)" stroke-width="2.5"
        stroke-dasharray="70 500" stroke-linecap="round"/>
      <path d="M22 50L22 22L50 22" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M150 22L178 22L178 50" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M22 150L22 178L50 178" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M150 178L178 178L178 150" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round"/>
      <defs>
        <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00e5ff"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="reticle-dot"></div>
  </div>
  <div class="scan-text">
    <b>Сканирование поверхности</b>
    Медленно водите камерой по полу или столу
  </div>
</div>

<div id="tap-hint">👆 Нажмите чтобы разместить сцену</div>
<div id="ar-tooltip">🌐 Нажмите на портал чтобы открыть сайт</div>
<div id="flash"></div>

<!-- A-FRAME SCENE -->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="logarithmicDepthBuffer: true; colorManagement: true; antialias: true;"
  vr-mode-ui="enabled: false"
  loading-screen="enabled: false"
  id="ar-scene"
>
  <a-assets>
    <!-- 🎵 Замените src на свой трек или URL -->
    <audio id="bgm" src="music.mp3" preload="auto" loop crossorigin="anonymous"></audio>
  </a-assets>

  <!-- Камера с курсором для кликов по 3D объектам -->
  <a-camera id="cam" look-controls="magicWindowTrackingEnabled: true">
    <a-cursor
      fuse="false"
      raycaster="objects: .tap; far: 15"
      material="color:#00e5ff; shader:flat; opacity:0.9"
      geometry="primitive:ring; radiusInner:0.016; radiusOuter:0.024"
    ></a-cursor>
  </a-camera>

  <!-- Освещение сцены -->
  <a-light type="ambient"     color="#ffffff" intensity="0.55"></a-light>
  <a-light type="directional" position="2 6 3" color="#ffffff" intensity="1.1"></a-light>

  <!-- ═══════════════════════════════════════════
       КОНТЕЙНЕР СЦЕНЫ — появится после тапа
       Все 3D-объекты находятся ЗДЕСЬ
       ═══════════════════════════════════════════ -->
  <a-entity id="world" visible="false">

    <!-- Тень под сценой -->
    <a-circle rotation="-90 0 0" radius="0.9"
      material="color:#050515; opacity:0.5; shader:flat; transparent:true">
    </a-circle>

    <!-- ───────────────────────────────────────────
         ОБЪЕКТ 1: КРИСТАЛЛ (центральный, вращается)
         ─────────────────────────────────────────── -->
    <a-entity
      position="0 0.28 0"
      animation__rot="property:rotation; to:0 360 0; loop:true; dur:7000; easing:linear"
      animation__bob="property:position; to:0 0.38 0; dir:alternate; loop:true; dur:2000; easing:easeInOutSine"
    >
      <!-- Верхний конус -->
      <a-cone height="0.3" radius-bottom="0.14" radius-top="0.01"
        color="#00e5ff" roughness="0.05" metalness="0.95">
      </a-cone>
      <!-- Нижний конус — октаэдр -->
      <a-cone height="0.3" radius-bottom="0.14" radius-top="0.01"
        rotation="180 0 0" position="0 -0.15 0"
        color="#4f46e5" roughness="0.05" metalness="0.95">
      </a-cone>
      <!-- Ореол свечения -->
      <a-sphere radius="0.2"
        material="color:#00e5ff; opacity:0.1; transparent:true; shader:flat; side:back">
      </a-sphere>
      <a-light type="point" color="#00e5ff" intensity="0.6" distance="1.2"></a-light>
    </a-entity>

    <!-- ───────────────────────────────────────────
         ОБЪЕКТ 2: КОЛЬЦА ВОКРУГ КРИСТАЛЛА
         ─────────────────────────────────────────── -->
    <a-torus position="0 0.28 0" radius="0.42" radius-tubular="0.013"
      color="#00e5ff" roughness="0.1" metalness="0.9" rotation="75 20 0"
      animation="property:rotation; to:435 380 360; loop:true; dur:9000; easing:linear">
    </a-torus>
    <a-torus position="0 0.28 0" radius="0.35" radius-tubular="0.009"
      color="#7c3aed" roughness="0.1" metalness="0.9" rotation="-45 60 0"
      animation="property:rotation; to:-405 420 360; loop:true; dur:6500; easing:linear">
    </a-torus>

    <!-- ───────────────────────────────────────────
         ОБЪЕКТ 3: ОРБИТАЛЬНЫЕ СФЕРЫ
         ─────────────────────────────────────────── -->
    <!-- Розовая сфера -->
    <a-entity position="0 0.28 0"
      animation="property:rotation; to:0 360 0; loop:true; dur:4000; easing:linear">
      <a-sphere position="0.58 0 0" radius="0.08"
        color="#ff6b9d" roughness="0.1" metalness="0.8"
        animation__p="property:scale; dir:alternate; to:1.3 1.3 1.3; loop:true; dur:1100; easing:easeInOutSine">
      </a-sphere>
    </a-entity>
    <!-- Золотая сфера -->
    <a-entity position="0 0.28 0"
      animation="property:rotation; to:0 -360 0; loop:true; dur:5500; easing:linear">
      <a-sphere position="0 0.42 0.46" radius="0.065"
        color="#ffd166" roughness="0.15" metalness="0.75">
      </a-sphere>
    </a-entity>
    <!-- Зелёная сфера -->
    <a-entity position="0 0.28 0"
      animation="property:rotation; to:0 360 0; loop:true; dur:7000; easing:linear">
      <a-sphere position="-0.5 -0.1 0.2" radius="0.055"
        color="#06d6a0" roughness="0.1" metalness="0.8">
      </a-sphere>
    </a-entity>

    <!-- ───────────────────────────────────────────
         ОБЪЕКТ 4: ЛЕТАЮЩИЙ КУБ
         ─────────────────────────────────────────── -->
    <a-box position="-0.65 0.22 0.1"
      width="0.17" height="0.17" depth="0.17"
      color="#ffd166" roughness="0.15" metalness="0.85"
      animation__rot="property:rotation; to:360 720 360; loop:true; dur:8000; easing:linear"
      animation__bob="property:position; to:-0.65 0.32 0.1; dir:alternate; loop:true; dur:1600; easing:easeInOutSine">
    </a-box>

    <!-- ───────────────────────────────────────────────────────────────────
         ОБЪЕКТ 5: ПОРТАЛ — КНОПКА ПЕРЕХОДА НА САЙТ
         Пульсирует, светится фиолетовым. Клик = переход на ваш сайт.
         ─────────────────────────────────────────────────────────────────── -->
    <a-entity id="portal"
      class="tap"
      position="0.72 0.28 -0.15"
    >
      <!-- Внешнее кольцо -->
      <a-torus radius="0.2" radius-tubular="0.025"
        color="#7c3aed" roughness="0" metalness="1"
        animation__spin="property:rotation; to:0 0 360; loop:true; dur:2800; easing:linear"
        animation__pulse="property:scale; dir:alternate; to:1.12 1.12 1.12; loop:true; dur:850; easing:easeInOutSine">
      </a-torus>
      <!-- Среднее кольцо -->
      <a-torus radius="0.14" radius-tubular="0.014"
        color="#00e5ff" roughness="0" metalness="1"
        animation__spin2="property:rotation; to:0 0 -360; loop:true; dur:2000; easing:linear">
      </a-torus>
      <!-- Заливка портала -->
      <a-circle radius="0.17"
        material="color:#7c3aed; opacity:0.7; transparent:true; shader:flat; side:double"
        animation__glow="property:material.opacity; dir:alternate; to:0.95; loop:true; dur:850; easing:easeInOutSine">
      </a-circle>
      <!-- Свечение -->
      <a-light type="point" color="#7c3aed" intensity="0.5" distance="0.8"></a-light>
      <!-- Подпись -->
      <a-text value="НА САЙТ" align="center" color="#ffffff"
        position="0 -0.28 0" scale="0.3 0.3 0.3" letter-spacing="3">
      </a-text>
      <!-- Иконка -->
      <a-text value="🌐" align="center" position="0 0 0.02" scale="0.55 0.55 0.55"></a-text>
      <!-- Увеличенная hit-зона -->
      <a-circle class="tap" radius="0.28"
        material="opacity:0; transparent:true">
      </a-circle>
    </a-entity>

    <!-- Частицы (генерируются JS) -->
    <a-entity id="particles-root"></a-entity>

  </a-entity><!-- /world -->

</a-scene>

<!-- UI BAR -->
<div id="ui-bar">
  <div class="ui-btn" id="music-btn" onclick="toggleMusic()">
    <div class="btn-pill">
      <div class="bars paused" id="bars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
    <span class="btn-label">Музыка</span>
  </div>

  <div class="ui-btn" onclick="takePhoto()">
    <div class="btn-shutter">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
        stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <span class="btn-label">Фото</span>
  </div>

  <div class="ui-btn" onclick="goToSite()">
    <div class="btn-pill">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </div>
    <span class="btn-label">Сайт</span>
  </div>
</div>

<!-- SHARE SHEET -->
<div id="share-backdrop" onclick="closeShare()"></div>
<div id="share-sheet">
  <div class="sheet-handle"></div>
  <img id="share-preview" src="" alt="">
  <div class="sheet-title">Поделиться фото</div>
  <div class="sheet-sub">Выберите приложение</div>
  <div class="share-grid">
    <div class="sapp" onclick="shareTo('instagram')">
      <div class="sapp-icon" style="background:linear-gradient(135deg,#f09433,#dc2743,#bc1888)">📸</div>
      <span class="sapp-label">Instagram</span>
    </div>
    <div class="sapp" onclick="shareTo('telegram')">
      <div class="sapp-icon" style="background:#229ED9">✈️</div>
      <span class="sapp-label">Telegram</span>
    </div>
    <div class="sapp" onclick="shareTo('whatsapp')">
      <div class="sapp-icon" style="background:#25D366">💬</div>
      <span class="sapp-label">WhatsApp</span>
    </div>
    <div class="sapp" onclick="shareTo('vk')">
      <div class="sapp-icon" style="background:#4C75A3">🔵</div>
      <span class="sapp-label">ВКонтакте</span>
    </div>
    <div class="sapp" onclick="shareTo('x')">
      <div class="sapp-icon" style="background:#000">✖️</div>
      <span class="sapp-label">X</span>
    </div>
    <div class="sapp" onclick="shareTo('facebook')">
      <div class="sapp-icon" style="background:#1877F2">📘</div>
      <span class="sapp-label">Facebook</span>
    </div>
    <div class="sapp" onclick="shareTo('tiktok')">
      <div class="sapp-icon" style="background:linear-gradient(135deg,#010101,#69C9D0)">🎵</div>
      <span class="sapp-label">TikTok</span>
    </div>
    <div class="sapp" onclick="shareTo('native')">
      <div class="sapp-icon" style="background:rgba(255,255,255,0.1)">📤</div>
      <span class="sapp-label">Ещё...</span>
    </div>
  </div>
  <button class="btn-save" onclick="savePhoto()">⬇️ Сохранить в галерею</button>
  <button class="btn-cancel" onclick="closeShare()">Закрыть</button>
</div>

<script>
// ╔══════════════════════════════════════╗
// ║  НАСТРОЙКИ — ЗАМЕНИТЕ НА СВОИ!      ║
// ╚══════════════════════════════════════╝
const CFG = {
  siteUrl:   'https://ВАШ_САЙТ.tilda.ws',       // ← ваш сайт на Tilda
  shareText: 'Посмотри этот AR-опыт! 🚀✨',       // ← текст при шэринге
  shareUrl:  'https://ВАШ-ДОМЕН.onrender.com',   // ← ссылка на эту AR страницу
};

let placed  = false;
let musicOn = false;
let captured = null;
const audio = document.getElementById('bgm');

// Показываем tap hint через 2.5 с (имитируем нахождение плоскости)
setTimeout(() => {
  if (!placed) {
    document.getElementById('scan-overlay').classList.add('hidden');
    document.getElementById('tap-hint').classList.add('show');
  }
}, 2500);

// ── Тап: размещение сцены ──────────────
const arScene = document.getElementById('ar-scene');
arScene.addEventListener('touchend', onTap, { passive: true });
arScene.addEventListener('click',    onTap);

function onTap(e) {
  if (placed) return;
  if (e.target.closest && (
    e.target.closest('#ui-bar') ||
    e.target.closest('#share-sheet') ||
    e.target.closest('#share-backdrop')
  )) return;

  placed = true;
  document.getElementById('tap-hint').classList.add('hidden');

  const cam  = document.getElementById('cam');
  const pos  = cam.getAttribute('position')  || {x:0,y:0,z:0};
  const rot  = cam.getAttribute('rotation')  || {x:0,y:0,z:0};
  const yRad = (rot.y * Math.PI) / 180;
  const dist = 1.4;
  const world = document.getElementById('world');

  world.setAttribute('position', {
    x: pos.x - Math.sin(yRad) * dist,
    y: pos.y - 1.5,
    z: pos.z - Math.cos(yRad) * dist
  });
  world.setAttribute('rotation', `0 ${rot.y} 0`);
  world.setAttribute('visible', 'true');
  world.setAttribute('scale', '0.01 0.01 0.01');
  world.setAttribute('animation__appear',
    'property:scale; to:1 1 1; dur:700; easing:easeOutElastic');

  setTimeout(() => document.getElementById('ui-bar').classList.add('show'), 500);
  setTimeout(startMusic, 900);
  spawnParticles();

  // Портал — обработчик клика
  document.getElementById('portal').addEventListener('click', goToSite);

  // Подсказка про портал
  setTimeout(() => {
    const tip = document.getElementById('ar-tooltip');
    tip.classList.add('show');
    setTimeout(() => tip.classList.remove('show'), 3500);
  }, 1600);
}

// ── Музыка ────────────────────────────
function startMusic() {
  audio.volume = 0;
  audio.play().then(() => {
    musicOn = true; updateMusicUI();
    let v = 0;
    const fi = setInterval(() => {
      v = Math.min(v + 0.04, 0.7); audio.volume = v;
      if (v >= 0.7) clearInterval(fi);
    }, 80);
  }).catch(() => {});
}

function toggleMusic() {
  if (!placed) return;
  musicOn ? (audio.pause(), musicOn = false) : (audio.play().catch(()=>{}), musicOn = true);
  updateMusicUI();
}

function updateMusicUI() {
  document.getElementById('music-btn').classList.toggle('music-on', musicOn);
  document.getElementById('bars').classList.toggle('paused', !musicOn);
}

// ── Переход на сайт ───────────────────
function goToSite() { window.open(CFG.siteUrl, '_blank'); }

// ── Фото ──────────────────────────────
function takePhoto() {
  if (!placed) return;
  const flash = document.getElementById('flash');
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 120);

  setTimeout(() => {
    const canvas = document.querySelector('a-scene canvas');
    if (!canvas) return;
    try {
      captured = canvas.toDataURL('image/jpeg', 0.93);
      const prev = document.getElementById('share-preview');
      prev.src = captured; prev.style.display = 'block';
    } catch(e) {
      captured = null;
      document.getElementById('share-preview').style.display = 'none';
    }
    openShare();
  }, 80);
}

// ── Шэринг ────────────────────────────
function openShare()  {
  document.getElementById('share-backdrop').classList.add('show');
  document.getElementById('share-sheet').classList.add('show');
}
function closeShare() {
  document.getElementById('share-backdrop').classList.remove('show');
  document.getElementById('share-sheet').classList.remove('show');
}

async function shareTo(app) {
  const text = CFG.shareText, url = CFG.shareUrl, enc = encodeURIComponent;
  if (app === 'native' && navigator.share) {
    const data = { title: 'AR Experience', text, url };
    if (captured && navigator.canShare) {
      try {
        const blob = d2b(captured);
        const file = new File([blob], 'ar.jpg', { type: 'image/jpeg' });
        if (navigator.canShare({ files: [file] })) data.files = [file];
      } catch(e) {}
    }
    await navigator.share(data).catch(() => {});
    closeShare(); return;
  }
  if (app === 'instagram') { savePhotoFile(); setTimeout(() => { window.location.href = 'instagram://story-camera'; }, 600); return; }
  const L = {
    telegram: `https://t.me/share/url?url=${enc(url)}&text=${enc(text)}`,
    whatsapp: `https://wa.me/?text=${enc(text+' '+url)}`,
    vk:       `https://vk.com/share.php?url=${enc(url)}&title=${enc(text)}`,
    x:        `https://twitter.com/intent/tweet?text=${enc(text+' '+url)}`,
    facebook: `https://www.facebook.com/sharer/sharer.php?u=${enc(url)}`,
    tiktok:   `https://www.tiktok.com/`,
  };
  if (L[app]) { window.open(L[app], '_blank'); closeShare(); }
}

function savePhoto()    { if (!captured) return; savePhotoFile(); }
function savePhotoFile() {
  const a = document.createElement('a');
  a.href = captured; a.download = `ar-${Date.now()}.jpg`; a.click();
}
function d2b(dataURL) {
  const [h,d] = dataURL.split(',');
  const mime = h.match(/:(.*?);/)[1];
  const bin  = atob(d); const arr = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

// ── Частицы ───────────────────────────
function spawnParticles() {
  const root   = document.getElementById('particles-root');
  const colors = ['#00e5ff','#7c3aed','#ff6b9d','#ffd166','#06d6a0'];
  for (let i=0; i<18; i++) {
    const a   = (i/18)*Math.PI*2;
    const r   = 0.2 + Math.random()*0.6;
    const h   = 0.05 + Math.random()*0.6;
    const col = colors[i % colors.length];
    const rad = (0.01 + Math.random()*0.022).toFixed(3);
    const dur = (1300 + Math.random()*2400).toFixed(0);
    const p   = document.createElement('a-sphere');
    p.setAttribute('position', `${(Math.cos(a)*r).toFixed(3)} ${h.toFixed(3)} ${(Math.sin(a)*r).toFixed(3)}`);
    p.setAttribute('radius', rad);
    p.setAttribute('material', `shader:flat; color:${col}`);
    p.setAttribute('animation',
      `property:position; to:${(Math.cos(a)*r*1.3).toFixed(3)} ${(h+0.18).toFixed(3)} ${(Math.sin(a)*r*1.3).toFixed(3)};
       dir:alternate; loop:true; dur:${dur}; easing:easeInOutSine`);
    root.appendChild(p);
  }
}
</script>
