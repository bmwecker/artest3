services:
  - type: web
    name: ar-experience
    runtime: static
    staticPublishPath: .
    headers:
      - path: /*
        name: Permissions-Policy
        value: "camera=*, xr-spatial-tracking=*"
      - path: /*
        name: Feature-Policy
        value: "camera *"
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
